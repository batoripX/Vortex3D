name: Vortex3D APK Build Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: 'gradle'

    - name: Install Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Setup Android NDK Environment Variables
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
        echo "NDK_LLVM=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

    - name: Compile C++20 Clang Modules
      run: |
        # Cross-compiling your engine object files natively using the runner's NDK binaries
        $NDK_LLVM/clang++ -std=c++20 -target aarch64-linux-android24 \
          -c Mesh.cpp Main.cpp
        $NDK_LLVM/llvm-ar rcs libvortex3d_engine.a Mesh.o Main.o

    - name: Compile Native App Package via Gradle
      run: |
        # Grant executable permissions to your repository wrapper
        chmod +x gradlew
        # Let Gradle handle the Kotlin Native component caching and artifact processing safely
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Vortex3D-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
