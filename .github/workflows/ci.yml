name: Vortex3D APK Build Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unpack Unified Engine Asset Payload
      run: |
        if [ -f "workspace_payload.tar.gz" ]; then
          tar -xzf workspace_payload.tar.gz
          rm workspace_payload.tar.gz
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: 'gradle'

    - name: Pin Explicit Stable Android NDK r29
      uses: android-actions/setup-android@v3
      with:
        ndk-version: '29.0.1'

    - name: Setup Precise NDK Path Environment Variables
      run: |
        # Pull directly from verified system variables exposed by the environment
        echo "NDK_LLVM=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

    - name: Compile C++20 Clang Modules & Interface
      run: |
        $NDK_LLVM/clang++ -std=c++20 -target aarch64-linux-android29 -c Mesh.cpp Main.cpp VortexDiagnostics.cpp VortexBridge.cpp
        $NDK_LLVM/llvm-ar rcs libvortex3d_engine.a Mesh.o Main.o VortexDiagnostics.o VortexBridge.o

    - name: Compile and Package APK via Gradle
      run: |
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Vortex3D-Debug-APK
        path: build/outputs/apk/debug/*.apk
