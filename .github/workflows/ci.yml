name: Vortex3D APK Build Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unpack Unified Engine Asset Payload
      run: |
        if [ -f "workspace_payload.tar.gz" ]; then
          tar -xzf workspace_payload.tar.gz
          rm workspace_payload.tar.gz
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: 'gradle'

    - name: Pin Explicit Stable Android NDK r29
      uses: android-actions/setup-android@v3
      with:
        ndk-version: '29.0.1'

    - name: Setup Precise NDK Path Environment Variables
      run: |
        echo "NDK_LLVM=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

    - name: Compile C++20 Clang Modules & Interface
      run: |
        # Enable modules cache directory path routing
        mkdir -p .module_cache
        
        # Base compiler options enabling clean C++20 standard modules linking
        FLAGS="-std=c++20 -target aarch64-linux-android29 -fmodules -fmodules-cache-path=.module_cache -I."
        
        echo "Step 1: Compiling primary module interfaces..."
        $NDK_LLVM/clang++ $FLAGS -Xclang -emit-module-interface -c Mesh.cpp -o Mesh.pcm
        $NDK_LLVM/clang++ $FLAGS -Xclang -emit-module-interface -c VortexDiagnostics.cpp -o VortexDiagnostics.pcm
        
        echo "Step 2: Compiling downstream dependent interfaces with explicit module file maps..."
        $NDK_LLVM/clang++ $FLAGS -fmodule-file=Vortex3D.Mesh=Mesh.pcm -fmodule-file=Vortex3D.Diagnostics=VortexDiagnostics.pcm -Xclang -emit-module-interface -c VortexBridge.cpp -o VortexBridge.pcm
        $NDK_LLVM/clang++ $FLAGS -fmodule-file=Vortex3D.Mesh=Mesh.pcm -fmodule-file=Vortex3D.Diagnostics=VortexDiagnostics.pcm -fmodule-file=Vortex3D.Bridge=VortexBridge.pcm -Xclang -emit-module-interface -c Main.cpp -o Main.pcm
        
        echo "Step 3: Translating module artifacts directly down to static machine libraries..."
        $NDK_LLVM/clang++ $FLAGS -fmodule-file=Vortex3D.Mesh=Mesh.pcm -fmodule-file=Vortex3D.Diagnostics=VortexDiagnostics.pcm -fmodule-file=Vortex3D.Bridge=VortexBridge.pcm -c Mesh.cpp VortexDiagnostics.cpp VortexBridge.cpp Main.cpp
        
        echo "Step 4: Creating binary archive..."
        $NDK_LLVM/llvm-ar rcs libvortex3d_engine.a Mesh.o VortexDiagnostics.o VortexBridge.o Main.o

    - name: Compile and Package APK via Gradle
      run: |
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Vortex3D-Debug-APK
        path: build/outputs/apk/debug/*.apk
