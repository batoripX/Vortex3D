name: Vortex3D APK Build Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Install Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Download Kotlin Native Compiler
      run: |
        mkdir -p opt/kotlinx
        curl -L https://github.com/JetBrains/kotlin/releases/download/v2.0.0/kotlin-native-linux-x86_64-2.0.0.tar.gz -o opt/kotlinx/konan.tar.gz
        tar -xzf opt/kotlinx/konan.tar.gz -C opt/kotlinx/
        echo "$GITHUB_WORKSPACE/opt/kotlinx/kotlin-native-linux-x86_64-2.0.0/bin" >> $GITHUB_PATH

    - name: Compile C++20 Clang Modules
      run: |
        # Cross-compiling for Android ARM64 architecture natively
        export NDK_LLVM="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
        $NDK_LLVM/clang++ -std=c++20 -target aarch64-linux-android24 \
          -c Mesh.cpp Main.cpp
        $NDK_LLVM/llvm-ar rcs libvortex3d_engine.a Mesh.o Main.o

    - name: Generate Kotlin Native Interop Bindings
      run: |
        cinterop -def engine.def -compiler-opts "-std=c++20" -o engine_bindings.klib

    - name: Compile Kotlin Native Binary
      run: |
        konanc JniBridge.kt VortexActivity.kt VortexSurfaceView.kt \
          -target android_arm64 \
          -library engine_bindings.klib \
          -produce dynamic \
          -o libvortex3d_engine

    - name: Assemble and Package APK Manifest
      run: |
        mkdir -p src/main/jniLibs/arm64-v8a
        cp libvortex3d_engine.so src/main/jniLibs/arm64-v8a/
        # Build the final unaligned debug package split
        ./gradlew assembleDebug

    - name: Sign APK (Debug key)
      run: |
        echo "Signing built package output..."
        # Standard debug keystore signature processing

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Vortex3D-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
