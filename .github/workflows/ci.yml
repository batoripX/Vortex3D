Name: Vortex3D APK Build Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Download Specific NDK Toolchain Components
      run: |
        sdkmanager --install "ndk;27.0.12077973" "build-tools;34.0.0" "platforms;android-34"
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.0.12077973" >> $GITHUB_ENV
        echo "TOOLCHAIN=${ANDROID_SDK_ROOT}/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

    - name: Compile Modern C++20 Modules & JNI
      run: |
        rm -rf build
        mkdir -p build/modules build/lib/arm64-v8a
        CLANG_CC="${{ env.TOOLCHAIN }}/x86_64-linux-android35-clang++"
        BASE_FLAGS="-target aarch64-linux-android35 -std=c++20 -stdlib=libc++ -O3 -Wall -Wextra -fPIC"
        $CLANG_CC $BASE_FLAGS -x c++-module --precompile Mesh.cpp -o build/modules/Vortex3D.Mesh.pcm
        $CLANG_CC $BASE_FLAGS -shared -fmodule-file=Vortex3D.Mesh=build/modules/Vortex3D.Mesh.pcm JniBridge.cpp -o build/lib/arm64-v8a/libvortex3d_jni.so

    - name: Compile Kotlin & Assemble APK
      run: |
        mkdir -p opt/kotlinc
        curl -L -o opt/kotlinc.zip https://github.com/JetBrains/kotlin/releases/download/v1.9.22/kotlin-compiler-1.9.22.zip
        unzip -q opt/kotlinc.zip -d opt/
        
        mkdir -p apk_root/lib/arm64-v8a apk_root/res/values manifest build/gen build/compiled_res
        cp build/lib/arm64-v8a/libvortex3d_jni.so apk_root/lib/arm64-v8a/
        
        cat << 'INNER_EOF' > manifest/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.vortex3d.app"><application android:label="Vortex3D" android:hasCode="true"><activity android:name="com.vortex3d.app.VortexActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>
        INNER_EOF

        echo '<resources><string name="app_name">Vortex3D</string></resources>' > apk_root/res/values/strings.xml
        ${ANDROID_SDK_ROOT}/build-tools/34.0.0/aapt2 compile --dir apk_root/res/ -o build/compiled_res/
        
        ./opt/kotlinc/bin/kotlinc -classpath ${ANDROID_SDK_ROOT}/platforms/android-34/android.jar VortexActivity.kt VortexSurfaceView.kt -d build/classes
        ${ANDROID_SDK_ROOT}/build-tools/34.0.0/d8 build/classes/com/vortex3d/app/*.class --lib ${ANDROID_SDK_ROOT}/platforms/android-34/android.jar --output apk_root/

        ${ANDROID_SDK_ROOT}/build-tools/34.0.0/aapt2 link -o build/Vortex3D-unsigned.apk -I ${ANDROID_SDK_ROOT}/platforms/android-34/android.jar --manifest manifest/AndroidManifest.xml -R build/compiled_res/*.flat --min-sdk-version 34 --target-sdk-version 34 --auto-add-overlay
          
        cd apk_root && zip -r ../build/Vortex3D-unsigned.apk classes.dex lib/ && cd ..

    - name: Sign APK (Debug key)
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        ${ANDROID_SDK_ROOT}/build-tools/34.0.0/apksigner sign --ks debug.keystore --ks-pass pass:android --out build/Vortex3D.apk build/Vortex3D-unsigned.apk

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Vortex3D-Debug-APK
        path: build/Vortex3D.apk
